server {
    listen 80;
    root /usr/share/nginx/html;

    # API routes → Ktor (no COOP/COEP headers on API responses)
    location ~ ^/(v1|\.well-known)/ {
        proxy_pass         http://api:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_read_timeout 35s;
    }

    # Immutable hashed assets (Flutter WASM, JS bundles) — long TTL
    # Note: nginx add_header does not inherit from parent blocks when the
    # child block defines its own add_header, so COOP/COEP must be repeated.
    location ~* \.(wasm|js)$ {
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback — short TTL so service worker updates propagate
    location / {
        add_header Cross-Origin-Opener-Policy  "same-origin"   always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
