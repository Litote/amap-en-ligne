# Local dev stack for the JVM deployment of the back.
#
# - postgres: same image and migrations as production (run flyway with the same SQL).
# - gotrue:   self-hosted Supabase Auth, signs HS256 tokens with GOTRUE_JWT_SECRET.
#             The same secret is exposed to the back as `GOTRUE_JWT_SECRET` so the
#             GoTrueAuthenticationService can verify tokens symmetrically.
# - flyway:   applies the back's migrations against the same Postgres on each up.
#
# Run:
#   docker compose -f back/deploy/jvm/docker-compose.yml up -d
#
# Then, from `back/`, copy the env example and start the back:
#   cp deploy/jvm/.env.example deploy/jvm/.env
#   ./gradlew :deploy:jvm:run
#
# `.env` is gitignored and auto-loaded by the `run` task in
# `deploy/jvm/build.gradle.kts`. Out-of-the-box values match the dev
# defaults below.
#
# Default credentials and the JWT secret are committed for dev convenience only —
# never reuse these values outside local development.

services:
  postgres:
    image: postgres:16
    container_name: amap-jvm-postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Runs once on first DB init (empty volume). Pre-creates the `auth`
      # schema so GoTrue's bundled migrations don't fail with
      # `schema "auth" does not exist`.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  flyway:
    image: flyway/flyway:10.17.3
    container_name: amap-jvm-flyway
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - -url=jdbc:postgresql://postgres:5432/postgres
      - -user=postgres
      - -password=postgres
      - -connectRetries=60
      # Tolerate a non-empty `public` schema (e.g. tables created by a
      # previous Flyway run on a persisted volume): record the current state
      # as a baseline rather than failing.
      - -baselineOnMigrate=true
      - migrate
    volumes:
      - "../../persistence/postgres/src/main/resources/db/migration:/flyway/sql:ro"

  gotrue:
    # Pinned to a stable tag — bump intentionally.
    image: supabase/gotrue:v2.158.1
    container_name: amap-jvm-gotrue
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "9999:9999"
    environment:
      # API
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:9999
      GOTRUE_SITE_URL: http://localhost:8080

      # Database — GoTrue manages its own `auth.*` schema.
      # `search_path=auth` is required: GoTrue's older migrations create
      # types unqualified (`CREATE TYPE factor_type ...`), so without it
      # they land in `public`; later migrations do `ALTER TYPE auth.factor_type`
      # and fail with `type "auth.factor_type" does not exist`.
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres?sslmode=disable&search_path=auth

      # JWT — must match what the back reads (GOTRUE_JWT_*).
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:-dev-jwt-secret-change-me-dev-jwt-secret-change-me}
      GOTRUE_JWT_ISSUER: http://localhost:9999
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_EXP: 3600

      # Email auth — signups enabled, confirmation required so GoTrue sends emails.
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "false"

      # SMTP — route all GoTrue outgoing mail through MailHog for local dev.
      GOTRUE_SMTP_HOST: mailhog
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_ADMIN_EMAIL: noreply@amap-en-ligne.fr
      GOTRUE_SMTP_SENDER_NAME: AMAP en ligne

      # Admin API — `/admin/*` expects a JWT signed with GOTRUE_JWT_SECRET and
      # carrying one of these roles.
      GOTRUE_JWT_ADMIN_ROLES: service_role,supabase_admin

      # Allow redirects to any localhost port so the Flutter web dev server
      # (random port each run) can receive the post-verification redirect.
      GOTRUE_URI_ALLOW_LIST: "http://localhost:**"

  # MailHog provides a local SMTP server and web UI for inspecting outgoing emails.
  # Matches the default env vars: SMTP_HOST=localhost, SMTP_PORT=1025.
  # Web UI: http://localhost:8025
  mailhog:
    image: mailhog/mailhog:latest
    container_name: amap-jvm-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

# ─── Production-like web deployment (profile: web) ───────────────────────────
#
# Adds Ktor (containerised) + nginx to the stack so the web app and API are
# served on the same domain (http://localhost).
#
# Prerequisites:
#   1. Build the Ktor distribution : cd back && ./gradlew :deploy:jvm:installDist
#   2. Build the Flutter web app   : cd front && flutter build web --wasm
#   3. Create back/deploy/jvm/.env with the required env vars (copy from .env.example)
#
# Run:
#   docker compose -f back/deploy/jvm/docker-compose.yml --profile web up -d
#
# Dev workflow (unchanged — no profile needed):
#   docker compose -f back/deploy/jvm/docker-compose.yml up -d
#   cd back && ./gradlew :deploy:jvm:run

  api:
    build: .
    container_name: amap-jvm-api
    profiles: ["web"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/.well-known/amap-en-ligne.json || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  nginx:
    image: nginx:alpine
    container_name: amap-jvm-nginx
    profiles: ["web"]
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../../front/build/web:/usr/share/nginx/html:ro
      # Instance-specific CGU overrides the bundled Flutter default.
      # Edit infra/instance/cgu.html to customise for this deployment.
      - ../../../infra/instance/cgu.html:/usr/share/nginx/html/cgu.html:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
