<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Semantic / status</div>
  <div class="swatches">
    <div class="swatch" style="background:#4CAF50;color:#fff">
      <div class="name">success</div><div class="hex">#4CAF50</div>
    </div>
    <div class="swatch" style="background:#B3261E;color:#fff">
      <div class="name">error</div><div class="hex">#B3261E</div>
    </div>
    <div class="swatch" style="background:#F9DEDC;color:#410E0B">
      <div class="name">error-container</div><div class="hex">#F9DEDC</div>
    </div>
    <div class="swatch" style="background:#9E9E9E;color:#fff">
      <div class="name">muted · grey</div><div class="hex">#9E9E9E</div>
    </div>
  </div>
</div>
</body>
</html>
