<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — body & label</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 10px; }
  .tag { font-family: 'Roboto Mono', monospace; font-size: 10px; color: var(--fg2); width: 110px; flex-shrink: 0;}
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="tag">titleMedium · 16/1.5 · 500</div>
    <div style="font: 500 16px/1.5 Roboto">J'ai déjà un compte</div>
  </div>
  <div class="row">
    <div class="tag">bodyMedium · 14/1.43 · 400</div>
    <div style="font: 14px/1.43 Roboto">Connectez-vous à votre espace personnel</div>
  </div>
  <div class="row">
    <div class="tag">bodySmall · 12/1.33 · 400</div>
    <div style="font: 12px/1.33 Roboto; color: var(--fg2)">Amap en Ligne est gratuit, open-source et auto-hébergeable.</div>
  </div>
  <div class="row">
    <div class="tag">labelLarge · 14 · 500 · UPPER</div>
    <div style="font: 500 14px/1 Roboto; color: var(--m3-primary); letter-spacing: 0.5px;">INFORMATIONS ORGANISATION</div>
  </div>
  <div class="row">
    <div class="tag">labelLarge · button</div>
    <div style="font: 500 14px/1 Roboto; letter-spacing: 0.5px;">SE CONNECTER</div>
  </div>
</div>
</body>
</html>
