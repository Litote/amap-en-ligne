<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neutral surface scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .swatch { min-height: 92px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">Surface tones · M3 neutral (warm-tinted)</div>
  <div class="swatches">
    <div class="swatch" style="background:#FFFFFF;color:#1A1C18;border:1px solid #C3C8BB"><div class="name">lowest</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch" style="background:#F6F7F0;color:#1A1C18;border:1px solid #DDDBD0"><div class="name">low</div><div class="hex">#F6F7F0</div></div>
    <div class="swatch" style="background:#F0F1EA;color:#1A1C18"><div class="name">container</div><div class="hex">#F0F1EA</div></div>
    <div class="swatch" style="background:#EAEBE4;color:#1A1C18"><div class="name">high</div><div class="hex">#EAEBE4</div></div>
    <div class="swatch" style="background:#E4E5DE;color:#1A1C18"><div class="name">highest</div><div class="hex">#E4E5DE</div></div>
  </div>
  <div style="margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
    <div class="swatch" style="background:#1A1C18;color:#FCFDF6;min-height:56px"><div class="name">on-surface</div><div class="hex">#1A1C18</div></div>
    <div class="swatch" style="background:#43483E;color:#FCFDF6;min-height:56px"><div class="name">on-surface-variant</div><div class="hex">#43483E</div></div>
    <div class="swatch" style="background:#73796E;color:#FCFDF6;min-height:56px"><div class="name">outline</div><div class="hex">#73796E</div></div>
  </div>
</div>
</body>
</html>
