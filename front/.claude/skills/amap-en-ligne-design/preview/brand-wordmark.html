<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg1); }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .card-w { background: #FFFFFF; border-radius: 12px; padding: 16px 20px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04);
  }
  .card-w img { height: 76px; }
  .card-w.dark { background: #1A1C18;}
  .meta { font-size: 11px; color: var(--fg2); margin-top: 4px;}
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div>
      <div class="card-w"><img src="../assets/wordmark.svg"></div>
      <div class="meta">Wordmark · Roboto 700 / 400 / 700 · carrot + Amap <i>en</i> Ligne</div>
    </div>
  </div>
</div>
</body>
</html>
