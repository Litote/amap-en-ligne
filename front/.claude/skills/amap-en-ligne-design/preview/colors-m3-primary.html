<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>M3 seed-derived primary</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">M3 ColorScheme.fromSeed(seedColor: Colors.green)</div>
  <div class="swatches">
    <div class="swatch" style="background:#386A20;color:#fff">
      <div class="name">primary</div><div class="hex">#386A20</div>
    </div>
    <div class="swatch" style="background:#FFFFFF;color:#386A20;border:1px solid #C3C8BB">
      <div class="name">on-primary</div><div class="hex">#FFFFFF</div>
    </div>
    <div class="swatch" style="background:#B7F397;color:#042100">
      <div class="name">primary-container</div><div class="hex">#B7F397</div>
    </div>
    <div class="swatch" style="background:#042100;color:#B7F397">
      <div class="name">on-primary-ct</div><div class="hex">#042100</div>
    </div>
  </div>
</div>
</body>
</html>
