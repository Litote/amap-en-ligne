<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — font family</title>
<link rel="stylesheet" href="_card.css">
<style>
  .big { font: 700 64px/1 Roboto; color: var(--fg1); margin-bottom: 12px; letter-spacing: -1px; }
  .meta { color: var(--fg2); font-size: 13px; line-height: 1.5; }
  .meta b { color: var(--fg1); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="big">Roboto Aa Bb 123</div>
  <div class="meta">
    <b>Roboto</b> · Material 3 default · 400 / 500 / 700<br>
    Flutter ships Roboto on all platforms. <code>google_fonts</code> is in pubspec but no override is applied — the app uses the platform default.
  </div>
</div>
</body>
</html>
