<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Primary colors</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .swatch.lg { min-height: 116px; }
</style>
</head>
<body>
<div class="card">
  <div class="swatches">
    <div class="swatch lg" style="background:#4CAF50;color:#fff">
      <div class="name">Primary · green</div>
      <div class="hex">#4CAF50 · Colors.green</div>
    </div>
    <div class="swatch lg" style="background:#2196F3;color:#fff">
      <div class="name">Secondary · blue</div>
      <div class="hex">#2196F3 · Colors.blue</div>
    </div>
    <div class="swatch lg" style="background:#FF9800;color:#fff">
      <div class="name">Tertiary · orange</div>
      <div class="hex">#FF9800 · Colors.orange</div>
    </div>
  </div>
</div>
</body>
</html>
