<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand mark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg2); }
  .wrap { display: flex; align-items: center; gap: 24px; }
  .mark { background: #FFFFFF; border-radius: 16px; padding: 20px; display:flex; align-items:center; justify-content:center; width: 160px; height: 160px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04);
  }
  .mark img { width: 110px; height: 110px; }
  .meta { color: var(--fg2); font-size: 12px; line-height: 1.6;}
  .meta b { color: var(--fg1); font-weight: 500; }
  .stack { display:flex; flex-direction: column; gap: 6px;}
</style>
</head>
<body>
<div class="card">
  <div class="wrap">
    <div class="mark"><img src="../assets/logo.svg" alt="Amap en Ligne"></div>
    <div class="meta stack">
      <div><b>Logo · Le Panier</b></div>
      <div>Un panier en osier garni d'aubergine,<br>de carotte et de tomate.</div>
      <div>L'objet central de chaque livraison AMAP —<br>variété et abondance d'une vraie récolte.</div>
    </div>
  </div>
</div>
</body>
</html>
