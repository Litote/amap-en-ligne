<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — display & headline</title>

  .specimen { color: var(--fg1); }

<div class="card">

  </div>
  <div class="row">
    <div class="tag">headlineSmall · 24/1.33 · 400</div>
    <div class="specimen" style="font: 24px/1.33 Roboto">Amap en ligne</div>
  </div>
  <div class="row">
    <div class="tag">titleLarge · 22/1.27 · 400</div>

  </div>
</div>
</body>
</html>
