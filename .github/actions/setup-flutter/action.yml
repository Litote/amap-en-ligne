name: 'Setup Flutter (Pinned)'
description: 'Sets up Flutter pinned to the exact version in .flutter-version'
inputs:
  working-directory:
    description: 'The directory containing .flutter-version'
    required: false
    default: 'front'

runs:
  using: "composite"
  steps:
    - name: Read Flutter version
      id: flutter-version
      shell: bash
      env:
        WORKING_DIR: ${{ inputs.working-directory }}
      run: echo "version=$(cat "${WORKING_DIR}/.flutter-version")" >> $GITHUB_OUTPUT

    - name: Setup Flutter
      uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
      with:
        flutter-version: ${{ steps.flutter-version.outputs.version }}
        channel: any
        cache: true
        cache-key: flutter-${{ runner.os }}-${{ steps.flutter-version.outputs.version }}

    - name: Pin exact Flutter version
      shell: bash
      env:
        FLUTTER_VERSION: ${{ steps.flutter-version.outputs.version }}
      run: |
        cd "$FLUTTER_ROOT"
        git fetch --tags
        git checkout "$FLUTTER_VERSION"

    - name: Verify Flutter version
      shell: bash
      run: flutter --version
