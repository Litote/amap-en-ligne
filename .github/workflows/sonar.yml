name: Sonar — Quality Gate

# Single SonarCloud project (Litote_amap-en-ligne) covering BOTH components:
#   - back  : Kotlin coverage via jacocoAggregatedReport
#   - front : Dart/Flutter coverage via flutter test --coverage (lcov)
# A combined multi-language analysis needs both coverages in one scanner run, so
# this dedicated workflow (full checkout + JDK + Flutter) runs from the repo root.

on:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'front/**'
      - 'acceptance/**'
      - 'convention/**'
      - 'gradle/**'
      - '.github/workflows/sonar.yml'
  pull_request:
    branches: [main]
    paths:
      - 'back/**'
      - 'front/**'
      - 'acceptance/**'
      - 'convention/**'
      - 'gradle/**'
      - '.github/workflows/sonar.yml'

concurrency:
  group: sonar-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  sonar:
    name: SonarCloud analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: false

      # Generate the front lcov first so it is present before the Sonar scan reads
      # it (deterministic ordering across the composite build's parallel tasks).
      - name: Front coverage (lcov)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: env.SONAR_TOKEN != ''
        run: ./gradlew frontTest

      - name: SonarCloud analysis + quality gate
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
        if: env.SONAR_TOKEN != ''
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ./gradlew allSonar \
              -Dsonar.pullrequest.key="$PR_NUMBER" \
              -Dsonar.pullrequest.branch="$PR_BRANCH" \
              -Dsonar.pullrequest.base="$PR_BASE"
          else
            ./gradlew allSonar
          fi
