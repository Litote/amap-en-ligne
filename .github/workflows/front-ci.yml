name: Front — Builds & Goldens

# Front analyze + codegen check + unit/widget/acceptance tests + coverage now run in the
# combined `ci.yml` `front` job (its lcov feeds the SonarCloud analysis). This workflow keeps
# only the artifact builds and golden tests, which are not coverage-related.

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front-ci.yml'
  # Allows the front-update-goldens workflow to trigger CI on its PR branch
  # (GITHUB_TOKEN cannot trigger other workflow runs — GitHub restriction).
  workflow_dispatch:

concurrency:
  group: front-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: front

jobs:
  # ── Build Android APK ─────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Java 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-android-${{ hashFiles('front/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-android-

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      # Release uses debug keys → no keystore secrets needed
      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-apk
          path: front/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

  # ── Build Web ─────────────────────────────────────────────────────────────
  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build Web (WASM)
        run: flutter build web --wasm

      - name: Upload web build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: web-build
          path: front/build/web/
          retention-days: 14

  # ── Build iOS + Golden tests ──────────────────────────────────────────────
  build-ios-goldens:
    name: Build iOS + Golden tests
    runs-on: macos-26

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Cache CocoaPods
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: front/ios/Pods
          key: pods-${{ hashFiles('front/ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Install dependencies
        run: flutter pub get --enforce-lockfile

      - name: Build iOS (simulator, no codesign)
        run: flutter build ios --no-codesign --simulator --debug

      - name: Golden tests
        run: |
          if [ -z "$(ls test/golden/goldens/*.png 2>/dev/null)" ]; then
            echo "No golden files found — skipping."
            echo "→ Run the 'Front — Update Golden Screenshots' workflow to generate them."
          else
            flutter test test/golden/ --tags golden --reporter=github
          fi

      - name: Upload golden diffs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: golden-failures
          path: front/test/golden/failures/
          retention-days: 7
