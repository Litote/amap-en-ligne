name: Deploy — Web (AWS)

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target (dev = automatic on push to main; prod = manual only)'
        type: choice
        options:
          - dev
          - prod
        default: dev

concurrency:
  # One web deploy at a time per target; do not cancel in-progress deploys
  group: deploy-web-${{ inputs.target == 'prod' && 'prod' || 'dev' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Build Flutter web + sync to S3 + invalidate CloudFront ────────────────
  # Independent of front-ci (mirrors deploy-lambda): push to main → dev,
  # manual dispatch → the chosen target. The GitHub environment selects the
  # per-target variables/secrets; prod lives in a separate AWS account behind
  # the `prod` environment's protection rules.
  deploy-web:
    name: Deploy Web (WASM)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ inputs.target == 'prod' && 'prod' || 'production' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Flutter
        uses: ./.github/actions/setup-flutter
        with:
          working-directory: front

      - name: Install dependencies
        working-directory: front
        run: flutter pub get --enforce-lockfile

      - name: Build Web (WASM)
        working-directory: front
        run: flutter build web --wasm

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: '~1.11'

      - name: Terraform init
        working-directory: infra
        env:
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
        run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}"

      - name: Select Terraform workspace
        working-directory: infra
        run: terraform workspace select "${{ inputs.target == 'prod' && 'prod' || 'dev' }}"

      # Read the deploy target from Terraform outputs — single source of truth,
      # identical to the infra/Makefile deploy-web-* targets.
      - name: Resolve web bucket and CloudFront distribution
        id: tf
        working-directory: infra
        run: |
          echo "web_bucket=$(terraform output -raw web_bucket)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      # --exclude "cgu.html" is mandatory: cgu.html is managed by Terraform as an
      # aws_s3_object; a `sync --delete` without the exclusion would remove it.
      - name: Sync build to S3
        env:
          WEB_BUCKET: ${{ steps.tf.outputs.web_bucket }}
        run: |
          aws s3 sync front/build/web/ "s3://${WEB_BUCKET}/" --delete --exclude "cgu.html"

      - name: Invalidate CloudFront
        env:
          DISTRIBUTION_ID: ${{ steps.tf.outputs.distribution_id }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*" \
            --no-cli-pager
