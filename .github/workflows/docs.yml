name: Docs — Publish help site

on:
  push:
    branches: [main]
    paths:
      - "documentation/guide/fr/**"
      - "site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

# Only one publish at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        # The guide is mounted in site/docs via a symlink;
        # checkout preserves symlinks on Linux.
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: site/requirements.txt

      - run: pip install -r site/requirements.txt

      - name: Build MkDocs
        working-directory: site
        run: mkdocs build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site/_build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
